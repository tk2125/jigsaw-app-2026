<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>共有活動 | ジグソー授業</title>
  <link rel="stylesheet" href="../css/common.css">
  <link rel="stylesheet" href="../css/student.css">
  <link rel="stylesheet" href="../css/sharing.css">
</head>
<body>
  <div id="loading" class="hidden"><div class="spinner"></div><p>読み込み中...</p></div>

  <header class="student-header">
    <span class="app-title">📚 ジグソー授業</span>
    <span class="phase-label">共有活動</span>
    <span class="trump-badge" id="trump-badge">--</span>
  </header>

  <main class="student-main sharing-main">
    <div id="error-message" class="alert alert-error hidden"></div>
    <div id="success-message" class="alert alert-success hidden"></div>

    <div class="sharing-header">
      <h2 class="sharing-group-title">グループ <span id="group-number">--</span></h2>
      <div class="sharing-auto-refresh">
        <span id="refresh-status">30秒後に自動更新</span>
        <button id="btn-refresh" class="btn btn-outline" style="font-size:14px; padding: 6px 14px;">今すぐ更新</button>
      </div>
    </div>

    <!-- スートタブ -->
    <div class="suit-tab-row" id="suit-tab-row">
      <!-- JSで描画 -->
    </div>

    <div class="sharing-layout">
      <!-- 左カラム：要約 + 投稿一覧 -->
      <div class="sharing-col-left">
        <div class="section-block">
          <div class="section-title">📋 要約</div>
          <div id="active-summary-area">
            <p class="text-muted">上のタブでスートを選んでください</p>
          </div>
        </div>
        <div class="section-block">
          <div class="section-title">💬 投稿一覧</div>
          <div id="posts-list">
            <p class="text-muted" style="font-size:14px;">読み込み中...</p>
          </div>
        </div>
      </div>

      <!-- 右カラム：投稿フォーム + 次へ -->
      <div class="sharing-col-right">
        <div class="section-block">
          <div class="section-title">✍️ 投稿する</div>
          <p class="form-hint" style="margin-bottom: 12px;">表示中のスートへの投稿になります</p>

          <div class="post-type-group" id="post-type-group">
            <label class="post-type-label">
              <input type="radio" name="post-type" value="question" checked>
              <span class="post-type-badge type-question">質問</span>
              <span class="post-type-desc">発表者に質問する</span>
            </label>
            <label class="post-type-label">
              <input type="radio" name="post-type" value="note">
              <span class="post-type-badge type-note">メモ追記</span>
              <span class="post-type-desc">気づいたことを追加</span>
            </label>
            <label class="post-type-label" id="expert-reply-option" style="display:none;">
              <input type="radio" name="post-type" value="expert_reply">
              <span class="post-type-badge type-expert">エキスパート回答</span>
              <span class="post-type-desc">質問に答える</span>
            </label>
          </div>

          <div class="form-group" style="margin-top: 12px;">
            <textarea id="post-input" class="form-textarea" rows="5"
              placeholder="投稿内容を入力..."></textarea>
          </div>
          <button id="btn-post" class="btn btn-primary btn-full btn-student">投稿する</button>
        </div>

        <div style="text-align: right; padding: 20px 0 40px;">
          <button id="btn-to-opinion" class="btn btn-success btn-lg btn-student">
            意見をまとめる →
          </button>
          <p class="form-hint mt-sm">共有活動が終わったら次へ進もう</p>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/supabase-client.js"></script>
  <script src="../js/student/sharing.js"></script>
</body>
</html>
