<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ジグソー授業 | 入室</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/student.css">
</head>
<body>
  <div id="loading" class="hidden"><div class="spinner"></div><p>読み込み中...</p></div>

  <div class="entry-wrap">
    <div class="entry-card">
      <h1>📚 ジグソー授業</h1>
      <p class="entry-subtitle">授業に入室してください</p>

      <div id="error-message" class="alert alert-error hidden"></div>
      <div id="success-message" class="alert alert-success hidden"></div>

      <!-- 既存セッション確認ダイアログ -->
      <div id="resume-dialog" class="hidden">
        <div class="alert alert-info" style="margin-bottom: 16px;">
          前回の授業データが見つかりました。どうしますか？
        </div>
        <div class="btn-group column">
          <button id="btn-resume" class="btn btn-primary btn-full btn-lg">続きから始める</button>
          <button id="btn-view-past" class="btn btn-outline btn-full">過去データを閲覧する（読み取り専用）</button>
          <button id="btn-new-entry" class="btn btn-secondary btn-full">新しく入室する</button>
        </div>
      </div>

      <!-- ステップ1: パスワード入力 -->
      <div id="step-password">
        <div class="form-group">
          <label class="form-label" for="input-password">授業パスワードを入力してください</label>
          <input type="text" id="input-password" class="form-input" placeholder="パスワード" autocomplete="off"
            style="font-size: 20px; padding: 14px; letter-spacing: 2px;">
        </div>
        <button id="btn-password-submit" class="btn btn-primary btn-full btn-lg">次へ →</button>
      </div>

      <!-- ステップ2: トランプ入力 -->
      <div id="step-trump" class="hidden">
        <div id="entry-message-banner" class="hidden" style="background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; font-size: 15px; color: #1e40af; text-align: center;"></div>
        <p style="font-size: 16px; color: var(--color-text-muted); margin-bottom: 20px; text-align: center;">
          あなたのカードを入力してください
        </p>

        <div class="form-group">
          <label class="form-label">スート（マーク）</label>
          <div class="suit-buttons" id="suit-buttons">
            <button class="suit-btn black" data-suit="♤">♤</button>
            <button class="suit-btn black" data-suit="♧">♧</button>
            <button class="suit-btn red" data-suit="♡">♡</button>
            <button class="suit-btn red" data-suit="♢">♢</button>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="input-card-number">数字</label>
          <select id="input-card-number" class="form-select" style="font-size: 20px; padding: 12px;">
            <option value="">選んでください</option>
            <option value="1">A（1）</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">J（11）</option>
            <option value="12">Q（12）</option>
            <option value="13">K（13）</option>
          </select>
        </div>

        <!-- ジョーカーメッセージ（必要な場合に表示） -->
        <div id="joker-message" class="joker-message hidden" style="margin-bottom: 16px;">
          🃏 今日は好きなグループに入ってください
        </div>

        <div style="display: flex; gap: 10px;">
          <button id="btn-trump-back" class="btn btn-secondary">← 戻る</button>
          <button id="btn-trump-submit" class="btn btn-primary btn-lg" style="flex: 1;">入室する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 重複入室警告モーダル -->
  <div id="duplicate-warning-modal" class="hidden" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;">
    <div style="background:#fff;border-radius:14px;padding:28px 24px;max-width:340px;width:92%;box-shadow:0 8px 32px rgba(0,0,0,0.22);">
      <div style="font-size:36px;text-align:center;margin-bottom:10px;">⚠️</div>
      <p style="font-size:15px;font-weight:700;text-align:center;margin-bottom:6px;">このカードには別の人が入室しています</p>
      <p style="font-size:14px;text-align:center;margin-bottom:4px;">カード：<strong id="duplicate-warning-card"></strong></p>
      <p style="font-size:13px;color:#64748b;text-align:center;margin-bottom:22px;">間違いの場合は先生に知らせてください。このまま続けますか？</p>
      <div style="display:flex;gap:10px;">
        <button id="btn-duplicate-back" class="btn btn-secondary" style="flex:1;">← 戻る</button>
        <button id="btn-duplicate-continue" class="btn btn-primary" style="flex:1;background:#dc2626;border-color:#dc2626;">このまま続ける</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/student/entry.js"></script>
</body>
</html>
